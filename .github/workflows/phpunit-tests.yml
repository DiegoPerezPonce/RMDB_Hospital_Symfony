# Nombre del flujo de trabajo que aparecerá en la pestaña "Actions" de GitHub
name: Pruebas de PHP (CI) - Versión Final

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  run-phpunit-tests:
    runs-on: ubuntu-latest

    env:
      # Aseguramos el uso de la base de datos SQLite.
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.test.db"
      # Forzamos a Composer a instalar las dependencias de desarrollo.
      COMPOSER_NO_DEV: 0

    steps:
      # 1. Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar el entorno de PHP
      # --- INICIO DE LA CORRECCIÓN FINAL ---
      # Le decimos a la acción que configure Composer correctamente desde el principio,
      # evitando el problema de las claves públicas y la interactividad.
      - name: Configurar PHP con extensiones necesarias
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, doctrine
          tools: composer:v2
          coverage: none
      # --- FIN DE LA CORRERECIÓN FINAL ---

      # 3. Cachear dependencias
      - name: Cachear dependencias
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      # 4. Instalar dependencias de Composer
      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --optimize-autoloader

      # 5. Configurar la base de datos de prueba
      - name: Crear la base de datos de prueba
        run: |
          php bin/console doctrine:database:create --env=test
          php bin/console doctrine:schema:create --env=test

      # 6. Ejecutar las pruebas de PHPUnit
      - name: Ejecutar PHPUnit
        run: ./vendor/bin/phpunit```