# Nombre del flujo de trabajo que aparecerá en la pestaña "Actions" de GitHub
name: Pruebas de PHP (CI)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  run-phpunit-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.test.db"

    steps:
      # 1. Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar el entorno de PHP
      - name: Configurar PHP con extensiones necesarias
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, doctrine
          tools: composer:v2
          coverage: none

      # --- NUEVO PASO DE DEPURACIÓN ---
      # Mostramos el contenido de composer.json para asegurarnos de que phpunit está en require-dev.
      - name: Mostrar contenido de composer.json
        run: cat composer.json

      # 4. Instalar dependencias con MÁXIMA VERBOSIDAD
      # La opción -vvv fuerza a Composer a mostrar cada paso que da.
      # Esto nos dirá por qué no está instalando las dependencias de desarrollo.
      - name: Instalar dependencias de Composer (Modo Depuración)
        run: composer install -vvv --prefer-dist --optimize-autoloader

      # 5. Configurar la base de datos de prueba
      - name: Crear la base de datos de prueba
        run: |
          php bin/console doctrine:database:create --env=test
          php bin/console doctrine:schema:create --env=test

      # 6. Paso de Depuración para verificar el resultado
      - name: Verificar el contenido del directorio bin
        run: ls -la vendor/bin

      # 7. Ejecutar las pruebas de PHPUnit
      - name: Ejecutar PHPUnit
        run: ./vendor/bin/phpunit