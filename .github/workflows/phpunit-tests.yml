# Nombre del flujo de trabajo que aparecerá en la pestaña "Actions" de GitHub
name: Pruebas de PHP (CI)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  run-phpunit-tests:
    runs-on: ubuntu-latest

    # --- INICIO DE LA CORRECCIÓN DEFINITIVA ---
    # Se definen las variables de entorno para TODO el trabajo.
    env:
      # 1. Aseguramos el uso de la base de datos SQLite.
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.test.db"
      # 2. Forzamos a Composer a que SÍ instale las dependencias de desarrollo.
      #    Esto sobreescribe cualquier configuración por defecto del entorno de CI.
      COMPOSER_NO_DEV: 0
    # --- FIN DE LA CORRECCIÓN DEFINITIVA ---

    steps:
      # 1. Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar el entorno de PHP
      - name: Configurar PHP con extensiones necesarias
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, doctrine
          tools: composer:v2
          coverage: none

      # 3. Cachear dependencias (la reactivamos, ya que no era la causa del problema)
      - name: Cachear dependencias
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      # 4. Instalar dependencias de Composer
      #    Gracias a la variable COMPOSER_NO_DEV: 0, este comando ahora instalará phpunit.
      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --optimize-autoloader

      # 5. Configurar la base de datos de prueba
      - name: Crear la base de datos de prueba
        run: |
          php bin/console doctrine:database:create --env=test
          php bin/console doctrine:schema:create --env=test

      # 6. (Opcional) Verificar la existencia de PHPUnit
      - name: Verificar el contenido del directorio bin
        run: ls -la vendor/bin

      # 7. Ejecutar las pruebas de PHPUnit
      - name: Ejecutar PHPUnit
        run: ./vendor/bin/phpunit